# 阿里云云效流水线配置
version: '1.0'
name: easy-book-ci-cd
displayName: Easy Book CI/CD 流水线
triggers:
  # 主分支推送时触发
  - type: push
    branch: 
      include:
        - master
        - main

# 全局环境变量
global:
  env:
    # MongoDB配置（在云效控制台设置变量）
    MONGO_HOST: ${MONGO_HOST}
    MONGO_PORT: ${MONGO_PORT}
    MONGO_PASSWORD: ${MONGO_PASSWORD}
    # 服务器配置
    SERVER_HOST: ${SERVER_HOST}
    
# 流水线阶段
stages:
  - name: build-frontend
    displayName: 构建前端
    strategy: naturally
    trigger: auto
    executor:
      - powershell
    steps:
      - step: build@node
        name: setup-node
        displayName: 安装Node.js环境
        nodeVersion: '18'
        commands:
          - echo "Node.js环境准备完成"
          
      - step: build@node
        name: build-frontend
        displayName: 构建前端应用
        nodeVersion: '18'
        commands:
          - cd frontend
          - npm config set registry https://registry.npmmirror.com/
          - npm install
          - npm run build
          - echo "前端构建完成"
          
  - name: build-backend
    displayName: 构建后端
    strategy: naturally
    trigger: auto
    executor:
      - powershell
    steps:
      - step: build@python
        name: setup-python
        displayName: 安装Python环境
        pythonVersion: '3.11'
        commands:
          - echo "Python环境准备完成"
          
      - step: build@python
        name: build-backend
        displayName: 构建后端应用
        pythonVersion: '3.11'
        commands:
          - cd backend
          - pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn
          - pip install -r requirements.txt
          - python -m pytest || echo "测试跳过"
          - echo "后端构建完成"
          
  - name: deploy
    displayName: 部署到腾讯云服务器
    strategy: naturally
    trigger: auto
    executor:
      - powershell
    steps:
      - step: deploy@ssh
        name: deploy-to-server
        displayName: 部署到腾讯云Lighthouse
        host: ${SERVER_HOST}
        port: 22
        username: root
        password: ${SERVER_PASSWORD}
        commands:
          - cd /opt/easy-book
          - git pull origin main
          - |
            # 创建环境变量文件
            cat > .env << EOF
            MONGODB_URL=mongodb://easy-book:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/easy_book
            DB_NAME=easy_book
            MONGO_HOST=${MONGO_HOST}
            MONGO_PORT=${MONGO_PORT}
            MONGO_PASSWORD=${MONGO_PASSWORD}
            PORT=8002
            EOF
          - docker-compose down
          - docker-compose up -d --build
          - docker system prune -f
          - echo "部署完成，等待服务启动..."
          - sleep 30
          
  - name: health-check
    displayName: 健康检查
    strategy: naturally
    trigger: auto
    executor:
      - powershell
    steps:
      - step: shell@linux
        name: check-backend-health
        displayName: 检查后端健康状态
        commands:
          - echo "检查后端API健康状态..."
          - response=$(curl -s -o /dev/null -w "%{http_code}" http://${SERVER_HOST}:8002/health || echo "000")
          - if [ "$response" = "200" ]; then echo "✅ 后端健康检查通过"; else echo "❌ 后端健康检查失败，状态码: $response"; exit 1; fi
          
      - step: shell@linux
        name: check-frontend-health
        displayName: 检查前端健康状态
        commands:
          - echo "检查前端服务健康状态..."
          - response=$(curl -s -o /dev/null -w "%{http_code}" http://${SERVER_HOST}:80 || echo "000")
          - if [ "$response" = "200" ]; then echo "✅ 前端健康检查通过"; else echo "❌ 前端健康检查失败，状态码: $response"; exit 1; fi
          
      - step: shell@linux
        name: check-database-connection
        displayName: 检查数据库连接
        commands:
          - echo "检查数据库连接状态..."
          - response=$(curl -s -X GET http://${SERVER_HOST}:8002/api/health/db || echo "connection_failed")
          - if [[ "$response" == *"healthy"* ]] || [[ "$response" == *"ok"* ]]; then echo "✅ 数据库连接正常"; else echo "❌ 数据库连接异常"; exit 1; fi
          
  - name: deploy-notification
    displayName: 部署通知
    strategy: naturally
    trigger: auto
    executor:
      - powershell
    steps:
      - step: shell@linux
        name: success-notification
        displayName: 部署成功通知
        commands:
          - echo "🎉 Easy Book 应用部署成功！"
          - echo "📱 前端访问地址: http://${SERVER_HOST}"
          - echo "🔧 后端API地址: http://${SERVER_HOST}:8002"
          - echo "📊 健康检查地址: http://${SERVER_HOST}:8002/health"