name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-unit-tests:
    name: 后端单元测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        working-directory: backend
        run: pytest tests/unit/ -v --tb=short

  backend-integration-tests:
    name: 后端集成测试
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        working-directory: backend
        env:
          MONGODB_URL: mongodb://localhost:27017
          DB_NAME: easy_book_test
        run: pytest tests/integration/ -v --tb=short

  frontend-tests:
    name: 前端测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx vue-tsc --noEmit || true

      - name: Build
        working-directory: frontend
        run: npm run build

  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-tests]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/easy-book

            # 拉取最新代码
            git pull origin master

            # 安装后端依赖
            cd backend
            pip3 install -r requirements.txt --break-system-packages -q

            # 构建前端
            cd ../frontend
            npm ci --silent
            npm run build

            # 重启后端服务
            sudo systemctl restart easy-book

            # 健康检查
            sleep 3
            curl -sf http://localhost:8002/health > /dev/null && echo "✅ Backend healthy" || exit 1
            curl -sf http://localhost/api/students/ > /dev/null && echo "✅ Nginx proxy OK" || exit 1
