version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:6
    container_name: easy-book-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: easybook123
      MONGO_INITDB_DATABASE: easy_book
    command: mongod --auth

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easy-book-backend
    restart: always
    ports:
      - "8002:8002"
    environment:
      MONGODB_URL: mongodb://admin:easybook123@mongodb:27017/easy_book?authSource=admin
      DB_NAME: easy_book
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    command: uvicorn api_server.main:app --host 0.0.0.0 --port 8002 --reload

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easy-book-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongodb_data:
    driver: local