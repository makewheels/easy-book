version: '3.8'

services:
  backend:
    build: ./backend
    container_name: easy-book-backend
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/easy_book
      - ENV=production
    depends_on:
      - mongo
    networks:
      - easy-book-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: easy-book-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - easy-book-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: easy-book-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=easy_book
    networks:
      - easy-book-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  easy-book-network:
    driver: bridge