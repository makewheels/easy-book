<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>泳课预约系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            height: 100vh;
            overflow: hidden;
            font-size: 18px;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            background-color: white;
            position: relative;
        }

        .page {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .page.active {
            display: flex;
        }

        .header {
            background-color: #1989fa;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .bottom-nav {
            display: flex;
            background-color: #fff;
            border-top: 1px solid #eee;
            padding: 8px 0;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            color: #666;
            font-size: 18px;
        }

        .nav-item.active {
            color: #1989fa;
        }

        /* 首页样式 */
        .date-group {
            margin-bottom: 20px;
        }

        .date-header {
            background-color: #f8f9fa;
            padding: 12px;
            font-weight: bold;
            color: #1989fa;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .time-slot {
            background-color: white;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .time-header {
            display: flex;
            align-items: center;
            padding: 12px;
            background-color: #fafafa;
            border-bottom: 2px solid #eee;
        }

        .time {
            font-weight: bold;
            color: #1989fa;
            margin-right: 10px;
            min-width: 60px;
            font-size: 26px;
        }

        .student-item {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .student-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .student-name {
            font-weight: bold;
            font-size: 22px;
        }

        .student-type {
            color: #666;
            font-size: 18px;
            margin: 0 5px;
        }

        .status {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .status-checked {
            background-color: #e6f7e6;
            color: #52c41a;
        }

        .status-absent {
            background-color: #fff2e8;
            color: #fa8c16;
        }

        .student-details {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 18px;
            color: #666;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            min-width: 70px;
        }

        .btn-checkin {
            background-color: #52c41a;
            color: white;
        }

        .btn-absent {
            background-color: #fa8c16;
            color: white;
        }

        /* 学生管理页面样式 */
        .student-card {
            background-color: white;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            padding: 15px;
            cursor: pointer;
        }

        .student-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .student-card-name {
            font-weight: bold;
            font-size: 20px;
        }

        .student-card-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            color: #666;
        }

        .student-card-next {
            margin-top: 5px;
            font-size: 16px;
            color: #999;
        }

        .btn-primary {
            background-color: #1989fa;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .add-student-btn {
            background-color: #1989fa;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            font-size: 20px;
        }

        /* 学生详情页面样式 */
        .form-section {
            background-color: white;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 15px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: #1989fa;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
            color: #666;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 18px;
        }

        .form-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 18px;
            background-color: white;
        }

        .quick-options {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .quick-option {
            padding: 6px 12px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .quick-option:hover {
            background-color: #e0e0e0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1989fa;
        }

        .stat-label {
            font-size: 16px;
            color: #666;
            margin-top: 2px;
        }

        .record-list {
            margin-top: 10px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-info {
            flex: 1;
        }

        .record-date {
            font-weight: bold;
            margin-bottom: 2px;
            font-size: 18px;
        }

        .record-time {
            font-size: 16px;
            color: #666;
        }

        .record-actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-edit {
            background-color: #1989fa;
            color: white;
        }

        .btn-save {
            background-color: #52c41a;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
        }

        .back-header {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #1989fa;
            color: white;
        }

        .back-btn {
            margin-right: 15px;
            cursor: pointer;
            font-size: 24px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 首页 - 预约页面 -->
        <div id="home-page" class="page active">
            <div class="header">泳课预约系统</div>
            <div class="content" id="appointments-content">
                <!-- 动态生成预约内容 -->
            </div>
            <div class="bottom-nav">
                <div class="nav-item active" onclick="showPage('home-page')">预约管理</div>
                <div class="nav-item" onclick="showPage('students-page')">学生管理</div>
            </div>
        </div>

        <!-- 学生管理页面 -->
        <div id="students-page" class="page">
            <div class="header">学生管理</div>
            <div class="content" id="students-content">
                <!-- 动态生成学生列表 -->
            </div>
            <div class="bottom-nav">
                <div class="nav-item" onclick="showPage('home-page')">预约管理</div>
                <div class="nav-item active" onclick="showPage('students-page')">学生管理</div>
            </div>
        </div>

        <!-- 学生详情页面 -->
        <div id="student-detail-page" class="page">
            <div class="back-header">
                <span class="back-btn" onclick="goBack()">&lt;</span>
                <span>学生详情</span>
            </div>
            <div class="content" id="student-detail-content">
                <!-- 动态生成学生详情 -->
            </div>
        </div>

        <!-- 新增学生页面 -->
        <div id="add-student-page" class="page">
            <div class="back-header">
                <span class="back-btn" onclick="goBack()">&lt;</span>
                <span>新增学生</span>
            </div>
            <div class="content" id="add-student-content">
                <!-- 动态生成新增学生表单 -->
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        let students = [
            {

            },
            {

                createTime: '2024-01-20',

            },
            {
                id: 3,
                name: '陈思雨',
                nickname: '思雨',

                project: '蛙泳',
                totalSessions: 8,
                attendedSessions: 3,
                remainingSessions: 5,
                price: 150,
                venueShare: 90,
                profit: 60,
                createTime: '2024-02-01',
                note: '性格开朗',
                nextAppointment: '12-01 14:00'
            },
            {
                id: 4,
                name: '张伟明',
                nickname: '伟明',
                type: '1v多',
                project: '自由泳',
                totalSessions: 15,
                attendedSessions: 7,
                remainingSessions: 8,
                price: 150,
                venueShare: 90,
                profit: 60,
                createTime: '2024-02-05',
                note: '很有天赋',
                nextAppointment: '12-01 14:00'
            },
            {
                id: 5,
                name: '李小华',
                nickname: '小华',
                type: '1v多',
                project: '蛙泳',
                totalSessions: 12,
                attendedSessions: 1,
                remainingSessions: 11,

                venueShare: 90,
                profit: 60,
                createTime: '2024-02-10',

                nextAppointment: null
            }
        ];

        let appointments = [
            {
                date: '11-30',
                weekday: '周六',
                isPast: true,
                slots: [
                    {
                        time: '08:00',
                        students: [
                            { studentId: 1, status: 'checked' }
                        ]
                    },
                    {

                            { studentId: 2, status: 'checked' }
                        ]
                    },
                    {

                            { studentId: 3, status: 'checked' },
                            { studentId: 4, status: 'absent' },
                            { studentId: 5, status: 'checked' }
                        ]
                    },
                    {
                        time: '16:00',
                        students: [
                            { studentId: 6, status: 'checked' },
                            { studentId: 7, status: 'checked' }
                        ]
                    }
                ]
            },
            {
                date: '12-01',
                weekday: '周日',
                isPast: false,
                slots: [
                    {
                        time: '08:00',
                        students: [
                            { studentId: 1, status: null }
                        ]
                    },
                    {
                        time: '09:00',
                        students: [
                            { studentId: 8, status: null }
                        ]
                    },
                    {
                        time: '14:00',
                        students: [
                            { studentId: 3, status: null },
                            { studentId: 4, status: null },
                            { studentId: 5, status: null },
                            { studentId: 9, status: null }
                        ]
                    }
                ]
            }
        ];

        // 添加更多学生用于演示
        students.push(
            {
                id: 6,
                name: '赵文静',
                nickname: '文静',
                type: '1v多',
                project: '蝶泳',
                totalSessions: 8,
                attendedSessions: 6,
                remainingSessions: 2,
                price: 150,
                venueShare: 90,
                profit: 60,
                createTime: '2024-01-25',
                note: '蝶泳技术很好',
                nextAppointment: null
            },
            {
                id: 7,
                name: '孙浩然',
                nickname: '浩然',
                type: '1v多',
                project: '踩水',
                totalSessions: 10,
                attendedSessions: 4,
                remainingSessions: 6,
                price: 150,
                venueShare: 90,
                profit: 60,
                createTime: '2024-02-15',
                note: '力量很强',
                nextAppointment: null
            },
            {
                id: 8,
                name: '周志强',
                nickname: '志强',
                type: '1v1',
                project: '仰泳',
                totalSessions: 12,
                attendedSessions: 8,
                remainingSessions: 4,
                price: 200,
                venueShare: 120,
                profit: 80,
                createTime: '2024-01-18',
                note: '仰泳进步明显',
                nextAppointment: '12-01 09:00'
            },
            {
                id: 9,
                name: '王芳芳',
                nickname: '芳芳',
                type: '1v多',
                project: '踩水',
                totalSessions: 10,
                attendedSessions: 2,
                remainingSessions: 8,
                price: 150,
                venueShare: 90,
                profit: 60,
                createTime: '2024-02-20',
                note: '刚开始学',
                nextAppointment: '12-01 14:00'
            }
        );

        let currentPage = 'home-page';
        let pageHistory = [];

        // 页面切换
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
            
            // 更新导航状态
            if (pageId === 'home-page' || pageId === 'students-page') {
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                event.target.classList.add('active');
            }
            
            currentPage = pageId;
            
            // 渲染页面内容
            renderPageContent(pageId);
        }

        // 返回上一页
        function goBack() {
            if (pageHistory.length > 0) {
                const previousPage = pageHistory.pop();
                showPage(previousPage);
            } else {
                showPage('home-page');
            }
        }

        // 渲染页面内容
        function renderPageContent(pageId) {
            switch(pageId) {
                case 'home-page':
                    renderAppointmentsPage();
                    break;
                case 'students-page':
                    renderStudentsPage();
                    break;
                case 'student-detail-page':
                    renderStudentDetailPage();
                    break;
                case 'add-student-page':
                    renderAddStudentPage();
                    break;
            }
        }

        // 渲染预约页面
        function renderAppointmentsPage() {
            const content = document.getElementById('appointments-content');
            let html = '';
            
            appointments.forEach(appointment => {
                html += `<div class="date-group">
                    <div class="date-header">${appointment.date} ${appointment.weekday}</div>`;
                
                appointment.slots.forEach(slot => {
                    html += `<div class="time-slot">
                        <div class="time-header">
                            <span class="time">${slot.time}</span>
                        </div>`;
                    
                    slot.students.forEach(studentSlot => {
                        const student = students.find(s => s.id === studentSlot.studentId);
                        if (student) {
                            html += `<div class="student-item">
                                <div class="student-info">
                                    <span class="student-name">${student.name}</span>
                                    <span class="student-type">${student.type}</span>`;
                            
                            if (appointment.isPast) {
                                if (studentSlot.status === 'checked') {
                                    html += `<span class="status status-checked">已签到</span>`;
                                } else if (studentSlot.status === 'absent') {
                                    html += `<span class="status status-absent">已缺席</span>`;
                                }
                            } else {
                                html += `<div class="action-buttons">
                                    <button class="btn btn-checkin" onclick="checkIn(${student.id}, '${appointment.date}', '${slot.time}')">签到</button>
                                    <button class="btn btn-absent" onclick="markAbsent(${student.id}, '${appointment.date}', '${slot.time}')">缺席</button>
                                </div>`;
                            }
                            
                            html += `</div>
                                <div class="student-details">
                                    <span>次数[${student.attendedSessions}/${student.totalSessions}]</span>
                                    <span>${student.project}</span>
                                </div>
                            </div>`;
                        }
                    });
                    
                    html += `</div>`;
                });
                
                html += `</div>`;
            });
            
            content.innerHTML = html;
        }

        // 渲染学生管理页面
        function renderStudentsPage() {
            const content = document.getElementById('students-content');
            let html = '';
            
            students.forEach(student => {
                html += `<div class="student-card" onclick="showStudentDetail(${student.id})">
                    <div class="student-card-header">
                        <span class="student-card-name">${student.name}</span>
                        <button class="btn-primary" onclick="event.stopPropagation(); quickAppointment(${student.id})">预约</button>
                    </div>
                    <div class="student-card-info">
                        <span>次数[${student.attendedSessions}/${student.totalSessions}]</span>
                        <span>${student.type}</span>
                    </div>
                    <div class="student-card-next">
                        下次: ${student.nextAppointment || '无预约'}
                    </div>
                </div>`;
            });
            
            html += `<div class="add-student-btn" onclick="showAddStudentPage()">+ 新增学生</div>`;
            
            content.innerHTML = html;
        }

        // 渲染学生详情页面
        function renderStudentDetailPage() {
            const content = document.getElementById('student-detail-content');
            const studentId = parseInt(new URLSearchParams(window.location.search).get('studentId')) || 1;
            const student = students.find(s => s.id === studentId);
            
            if (!student) return;
            
            const html = `<div class="form-section">
                <div class="section-title">基本信息</div>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" value="${student.name}" id="student-name">
                </div>
                <div class="form-group">
                    <label class="form-label">别称</label>
                    <input type="text" class="form-input" value="${student.nickname || ''}" id="student-nickname">
                </div>
                <div class="form-group">
                    <label class="form-label">学习项目</label>
                    <input type="text" class="form-input" value="${student.project}" id="student-project">
                    <div class="quick-options">
                        <span class="quick-option" onclick="setProject('蛙泳')">蛙泳</span>
                        <span class="quick-option" onclick="setProject('踩水')">踩水</span>
                        <span class="quick-option" onclick="setProject('自由泳')">自由泳</span>
                        <span class="quick-option" onclick="setProject('蝶泳')">蝶泳</span>
                        <span class="quick-option" onclick="setProject('仰泳')">仰泳</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <input type="text" class="form-input" value="${student.note || ''}" id="student-note">
                </div>
            </div>
            
            <div class="form-section">
                <div class="section-title">套餐信息</div>
                <div class="form-group">
                    <label class="form-label">套餐类型</label>
                    <input type="text" class="form-input" value="${student.type}" id="student-type">
                </div>
                <div class="form-group">
                    <label class="form-label">售价</label>
                    <input type="text" class="form-input" value="${student.price}" id="student-price">
                    <span>元</span>
                </div>
                <div class="form-group">
                    <label class="form-label">游泳馆分成</label>
                    <input type="text" class="form-input" value="${student.venueShare}" id="student-venue-share">
                    <span>元</span>
                </div>
                <div class="form-group">
                    <label class="form-label">计次方式</label>
                    <div>
                        <label>
                            <input type="radio" name="counting-method" value="total" checked> 总次数
                            <input type="number" class="form-input" value="${student.totalSessions}" id="student-total-sessions" style="width: 100px; display: inline-block;">
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="radio" name="counting-method" value="unlimited"> 不限次数
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">剩余次数</label>
                    <input type="text" class="form-input" value="${student.remainingSessions}" id="student-remaining-sessions">
                </div>
                <div class="form-group">
                    <label class="form-label">创建时间</label>
                    <input type="text" class="form-input" value="${student.createTime}" readonly>
                </div>
            </div>
            
            <div class="form-section">
                <div class="section-title">上课统计</div>
                <div class="stats-grid">

            <div class="form-section">

                        <div class="record-info">

            content.innerHTML = html;

        // 渲染新增学生页面
        function renderAddStudentPage() {
            const content = document.getElementById('add-student-content');
            const html = `<div class="form-section">
                <div class="section-title">基本信息</div>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" placeholder="请输入姓名" id="new-student-name">
                </div>
                <div class="form-group">
                    <label class="form-label">别称</label>
                    <input type="text" class="form-input" placeholder="请输入别称" id="new-student-nickname">
                </div>
                <div class="form-group">
                    <label class="form-label">学习项目</label>
                    <input type="text" class="form-input" placeholder="请选择学习项目" id="new-student-project">
                    <div class="quick-options">
                        <span class="quick-option" onclick="setNewProject('蛙泳')">蛙泳</span>
                        <span class="quick-option" onclick="setNewProject('踩水')">踩水</span>
                        <span class="quick-option" onclick="setNewProject('自由泳')">自由泳</span>
                        <span class="quick-option" onclick="setNewProject('蝶泳')">蝶泳</span>
                        <span class="quick-option" onclick="setNewProject('仰泳')">仰泳</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <input type="text" class="form-input" placeholder="请输入备注" id="new-student-note">
                </div>
            </div>
            
            <div class="form-section">
                <div class="section-title">套餐信息</div>
                <div class="form-group">
                    <label class="form-label">套餐类型</label>
                    <input type="text" class="form-input" placeholder="请输入套餐类型" id="new-student-type">
                </div>
                <div class="form-group">
                    <label class="form-label">售价</label>
                    <input type="text" class="form-input" placeholder="请输入售价" id="new-student-price">
                    <span>元</span>
                </div>
                <div class="form-group">
                    <label class="form-label">游泳馆分成</label>
                    <input type="text" class="form-input" placeholder="请输入游泳馆分成" id="new-student-venue-share">
                    <span>元</span>
                </div>
                <div class="form-group">
                    <label class="form-label">计次方式</label>
                    <div>
                        <label>
                            <input type="radio" name="new-counting-method" value="total" checked> 总次数
                            <input type="number" class="form-input" placeholder="请输入次数" id="new-student-total-sessions" style="width: 100px; display: inline-block;">
                        </label>
                    </div>
                    <div>
                        <label>
                            <input type="radio" name="new-counting-method" value="unlimited"> 不限次数
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">剩余次数</label>
                    <input type="text" class="form-input" placeholder="请输入剩余次数" id="new-student-remaining-sessions">
                </div>
            </div>
            
            <button class="btn-save" onclick="addNewStudent()">保存</button>`;
            
            content.innerHTML = html;
        }

        // 显示学生详情
        function showStudentDetail(studentId) {
            pageHistory.push(currentPage);
            window.history.pushState({}, '', `?studentId=${studentId}`);
            showPage('student-detail-page');
        }

        // 显示新增学生页面
        function showAddStudentPage() {
            pageHistory.push(currentPage);
            showPage('add-student-page');
        }

        // 快速预约
        function quickAppointment(studentId) {
            alert(`快速预约功能待开发，学生ID: ${studentId}`);
        }

        // 签到
        function checkIn(studentId, date, time) {
            const student = students.find(s => s.id === studentId);
            if (student) {
                student.attendedSessions++;
                student.remainingSessions--;
                alert(`${student.name} 签到成功！`);
                renderAppointmentsPage();
            }
        }

        // 标记缺席
        function markAbsent(studentId, date, time) {
            const student = students.find(s => s.id === studentId);
            if (student) {
                alert(`${student.name} 已标记为缺席！`);
                renderAppointmentsPage();
            }
        }

        // 设置学习项目
        function setProject(project) {
            document.getElementById('student-project').value = project;
        }

        function setNewProject(project) {
            document.getElementById('new-student-project').value = project;
        }

        // 保存学生信息
        function saveStudent(studentId) {
            const student = students.find(s => s.id === studentId);
            if (student) {
                student.name = document.getElementById('student-name').value;
                student.nickname = document.getElementById('student-nickname').value;
                student.project = document.getElementById('student-project').value;
                student.note = document.getElementById('student-note').value;
                student.type = document.getElementById('student-type').value;
                student.price = parseInt(document.getElementById('student-price').value);
                student.venueShare = parseInt(document.getElementById('student-venue-share').value);
                student.profit = parseInt(document.getElementById('student-profit').value);
                
                alert('保存成功！');
                goBack();
            }
        }

        // 添加新学生
        function addNewStudent() {
            const name = document.getElementById('new-student-name').value;
            const nickname = document.getElementById('new-student-nickname').value;
            const project = document.getElementById('new-student-project').value;
            const note = document.getElementById('new-student-note').value;
            const type = document.getElementById('new-student-type').value;
            const price = parseInt(document.getElementById('new-student-price').value);
            const venueShare = parseInt(document.getElementById('new-student-venue-share').value);
            const profit = parseInt(document.getElementById('new-student-profit').value);
            
            if (!name || !project || !price || !venueShare || !profit) {
                alert('请填写完整信息！');
                return;
            }
            
            const newStudent = {
                id: students.length + 1,
                name: name,
                nickname: nickname,
                type: type,
                project: project,
                totalSessions: 10,
                attendedSessions: 0,
                remainingSessions: 10,
                price: price,
                venueShare: venueShare,
                profit: profit,
                createTime: new Date().toISOString().split('T')[0],
                note: note,
                nextAppointment: null
            };
            
            students.push(newStudent);
            alert('新增学生成功！');
            goBack();
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderAppointmentsPage();
        });
    </script>
</body>
</html>
